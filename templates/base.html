<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}">

<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.png') }}">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Furgoni">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta charset="UTF-8">
    <title>Gestione Furgoni</title>
<link rel="icon" href="{{ url_for('static', filename='logo.png') }}">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .topbar a {
            text-decoration: none;
            padding: 8px 12px;
            background: #333;
            color: #fff;
            border-radius: 6px;
        }

        .card {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            gap: 15px;
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .stats {
            font-size: 26px;
            font-weight: bold;
            margin-top: 5px;
        }

        .muted {
            color: #777;
            font-size: 14px;
        }

        input, select, textarea {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            max-width: 300px;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        img {
            max-width: 100%;
        }

        .flash {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
        }

        .flash.success {
            background: #d4edda;
            color: #155724;
        }

        .flash.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

    <!-- Messaggi flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Contenuto -->
    {% block content %}
    {% endblock %}

</body>
</html>
